[tools]
go = "latest"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
java = "21"
kotlin = "latest"
node = "latest"
erlang = "latest"
elixir = "latest"
python = "latest"
ruby = "latest"
yt-dlp = "latest"
ktlint = "latest"
jujutsu = "latest"
terraform = "latest"
gradle = "latest"
aws = { version = "latest", symlink_bins = "true" }
yarn = "1.22.22"
flutter = { version = "latest", platforms = { linux-arm64 = { url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_arm64_{{ version | replace(from="-stable", to="") }}-stable.tar.xz' }, linux-x64 = { url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_{{ version | replace(from="-stable", to="") }}-stable.tar.xz' } }, url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/{{ os() }}/flutter_{{ os() }}{{ arch(x64="", arm64="_arm64") }}_{{ version | replace(from="-stable", to="") }}-stable.zip', version_expr = 'fromJSON(body).releases | filter({ #.channel == "stable" }) | map({ #.version }) | sortVersions()', version_list_url = "https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json" }

