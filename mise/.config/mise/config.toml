[tools]
go = "1.26.3"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
java = "21"
kotlin = "latest"
node = "latest"
erlang = "latest"
elixir = "latest"
python = "latest"
ruby = "latest"
yt-dlp = "latest"
ktlint = "latest"
jujutsu = "latest"
terraform = "latest"
gradle = "latest"
aws = { version = "latest", symlink_bins = "true" }
yarn = "1.22.22"
bun = "latest"
maven = "latest"

[tools."http:flutter"]
version = "latest"
url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/{{ os() }}/flutter_{{ os() }}{{ arch(x64="", arm64="_arm64") }}_{% raw %}{{ version }}{% endraw %}-stable.zip'
version_expr = 'fromJSON(body).releases | filter({ #.channel == "stable" }) | map({ #.version }) | sortVersions()'
version_list_url = "https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json"

[tools."http:flutter".platforms]
linux-arm64 = { url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_arm64_{% raw %}{{ version }}{% endraw %}-stable.tar.xz' }
linux-x64 = { url = 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_{% raw %}{{ version }}{% endraw %}-stable.tar.xz' }

