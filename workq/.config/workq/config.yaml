actor_id: sanmoo
max_agents: 4
sources:
  - /home/sanmoo/dev/github.com/lorebase/lorebase-frontend
  - /home/sanmoo/dev/github.com/lorebase/lorebase-backend
  - /home/sanmoo/dev/github.com/lorebase/lorebase-design
  - /home/sanmoo/dev/github.com/Sanmoo/workq
prompt_template: |
  Contexto operacional:
  - Você foi iniciado pelo WorkQ.
  - A task já está claimed: {{ .TaskRef }}
  - Repositório: {{ .RepoID }}
  - Backlog: {{ .BacklogID }}
  - Task ID: {{ .TaskID }}
  - Título: {{ .Title }}
  - Não edite arquivos `.tasks` manualmente.
  - Use a CLI `workq` para consultar ou alterar status.
  - Só marque a task como done se o humano pedir explicitamente.
launcher:
  name: herdr-pi
  mode: command
  command: /home/sanmoo/.config/workq/launcher-herdr-pi.sh
